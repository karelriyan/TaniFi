name: Bug Report
description: Create a report to help us improve TaniFi
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what went wrong...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run experiment with config '...'
        2. Set flag '--x'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: What OS, Python version, and GPU are you using?
      placeholder: |
        - OS: Ubuntu 24.04
        - Python: 3.10
        - GPU: RTX 3090 / CUDA 12.1
    validations:
      required: true
